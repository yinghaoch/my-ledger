<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>全功能雲端記帳本</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>
    <div class="container">
        <h2>💰 全功能雲端記帳本</h2>
        
        <div id="authArea" class="card bg-light text-center">
            <p id="welcomeMsg">請先登入以同步您的雲端帳本</p>
            <button id="loginBtn" class="btn-g">使用 Google 帳號登入</button>
            <button id="logoutBtn" class="btn-danger" style="display: none;">登出帳號</button>
        </div>

        <div id="mainApp" style="opacity: 0.3; pointer-events: none; transition: 0.3s;">
            
            <div class="tabs">
                <button id="tabPersonal" class="tab-btn active">🔒 個人私帳</button>
                <button id="tabGroup" class="tab-btn">👥 群組分帳</button>
            </div>

            <div class="card">
                <h3 id="currentModeTitle">新增個人消費</h3>
                
                <div class="form-group text-center">
                    <button id="scanInvoiceBtn" class="btn-scan">📷 掃描發票 QR Code 記帳</button>
                    <div id="reader" style="display: none; width: 100%; margin-top: 10px;"></div>
                </div>
                
                <div class="form-group" id="groupCodeArea" style="display: none;">
                    <label>群組代碼：</label>
                    <input type="text" id="groupCode" value="預設群組">
                </div>

                <div class="form-group">
                    <label>消費日期：</label>
                    <input type="date" id="dateInput">
                </div>
                <div class="form-group">
                    <label>花費品名：</label>
                    <input type="text" id="itemInput" placeholder="例如：午餐、八方">
                </div>
                <div class="form-group">
                    <label>金額：</label>
                    <input type="number" id="amountInput" placeholder="輸入金額">
                </div>

                <div class="form-group" id="payerArea" style="display: none;">
                    <label>誰墊的錢？</label>
                    <input type="text" id="payerInput" placeholder="留空預設為你自己">
                </div>

                <button id="saveBtn">儲存至雲端</button>
            </div>

            <div id="reportArea">
                <h3>📊 帳目統計 (總覽)</h3>
                <div id="reportCard" class="card report-card">
                    <p>計算中...</p>
                </div>
            </div>

            <h3>📜 歷史明細 (點擊日期可收折)</h3>
            <div class="delete-toolbar">
                <button id="deleteSelectedBtn" class="btn-danger btn-toolbar-del">🗑️ 刪除選中項目</button>
                <button id="deleteAllBtn" class="btn-danger btn-toolbar-del" style="background:#8e8e93;">⚠️ 全部清空</button>
            </div>
            <div id="historyCollapseContainer" style="margin-top: 12px;"></div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
