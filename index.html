<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>全功能雲端記帳本</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>
    <div class="container">
        <h2>💰 全功能雲端記帳本</h2>
        
        <div id="authArea" class="card bg-light text-center">
            <p id="welcomeMsg">請先登入以同步您的雲端帳本</p>
            <button id="loginBtn" class="btn-g">使用 Google 帳號登入</button>
            <button id="logoutBtn" class="btn-danger" style="display: none;">登出帳號</button>
        </div>

        <div id="mainApp" style="opacity: 0.3; pointer-events: none; transition: 0.3s;">
            
            <div class="tabs">
                <button id="tabPersonal" class="tab-btn active">🔒 個人私帳</button>
                <button id="tabGroup" class="tab-btn">👥 多人群組分帳</button>
            </div>

            <div class="card">
                <h3 id="currentModeTitle">新增個人消費 (私帳)</h3>
                
                <div id="groupCodeArea" style="display: none;">
                    <div class="form-group">
                        <label>群組代號 (房間名稱)：</label>
                        <input type="text" id="groupCode" placeholder="例如：2026出遊團">
                    </div>
                    <div class="form-group">
                        <label>房間密碼：</label>
                        <input type="password" id="groupPassword" placeholder="請輸入此房間的通關密碼">
                    </div>
                </div>

                <div class="form-group" style="text-align: center;">
                    <button id="scanInvoiceBtn" class="btn-scan">📷 掃描發票 QR Code 自動帶入</button>
                    <div id="reader" style="width: 100%; max-width: 400px; margin: 10px auto; display: none; border-radius: 8px; overflow: hidden;"></div>
                </div>

                <div class="form-group">
                    <label>消費日期：</label>
                    <input type="date" id="dateInput">
                </div>
                <div class="form-group">
                    <label>品名：</label>
                    <input type="text" id="itemInput" placeholder="例如：午餐、民宿">
                </div>
                <div class="form-group">
                    <label>金額：</label>
                    <input type="number" id="amountInput" placeholder="輸入金額">
                </div>
                
                <div class="form-group">
                    <label>附上照片憑證 (會自動壓縮)：</label>
                    <input type="file" id="photoInput" accept="image/*">
                    <div id="previewArea" style="margin-top: 10px; display: none;">
                        <img id="imgPreview" src="" style="width: 100%; max-height: 150px; object-fit: cover; border-radius: 8px;">
                        <p id="compressInfo" style="font-size: 11px; color: #8e8e93; margin-top: 2px;"></p>
                    </div>
                </div>

                <div class="form-group" id="payerArea" style="display: none;">
                    <label>誰墊的錢？</label>
                    <input type="text" id="payerInput" placeholder="留空預設為你自己">
                </div>

                <button id="saveBtn">儲存至雲端</button>
            </div>

            <div id="reportArea">
                <h3>📊 帳目統計</h3>
                <div id="reportCard" class="card report-card">
                    <p>計算中...</p>
                </div>
            </div>

            <div class="history-title-area">
                <h3>📜 歷史消費明細</h3>
                <div class="history-actions">
                    <button id="deleteSelectedBtn" class="btn-danger-outline">🗑️ 刪除選中</button>
                    <button id="deleteAllBtn" class="btn-danger-outline" style="background:#ff3b30; color:#fff;">💥 清空全部</button>
                </div>
            </div>
            
            <div id="historyCollapseContainer">
                <p style="text-align:center; color:#8e8e93; margin-top:20px;">載入中...</p>
            </div>

        </div>
    </div>
</body>
</html>
