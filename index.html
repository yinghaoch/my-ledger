<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>全功能雲端記帳本</title>
    
    <script>
        (function() {
            var ua = navigator.userAgent || navigator.vendor || window.opera;
            var url = window.location.href;

            // 偵測是否在 LINE 內置瀏覽器中
            if (ua.indexOf("Line") > -1) {
                // 🍏 Android 專用跳出 LINE 語法
                if (ua.indexOf("Android") > -1) {
                    if (url.indexOf("openExternalBrowser=1") === -1) {
                        var newUrl = url + (url.indexOf("?") > -1 ? "&" : "?") + "openExternalBrowser=1";
                        window.location.href = newUrl;
                    }
                } 
                // 🍎 iOS (iPhone) 專用跳出 LINE 語法
                else if (ua.indexOf("iPhone") > -1 || ua.indexOf("iPad") > -1 || ua.indexOf("iPod") > -1) {
                    // 如果網址後面還沒有加這個特殊參數，就帶有這參數重導向，LINE 偵測到此參數在 iOS 會強制用 Safari 打開
                    if (url.indexOf("openExternalBrowser=1") === -1) {
                        var newUrl = url + (url.indexOf("?") > -1 ? "&" : "?") + "openExternalBrowser=1";
                        // 嘗試用 LINE 官方支援的外部瀏覽器重導向網址
                        window.location.href = newUrl;
                    }
                }
            }
        })();
    </script>

    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
