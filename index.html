<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>全功能雲端記帳本</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>
    <div class="container">
        <h2>💰 全功能雲端記帳本</h2>
        
        <div id="authArea" class="card bg-light text-center">
            <p id="welcomeMsg">請先登入以同步您的雲端帳本</p>
            <button id="loginBtn" class="btn-g">使用 Google 帳號登入</button>
            <button id="logoutBtn" class="btn-danger" style="display: none;">登出帳號</button>
        </div>

        <div id="mainApp" style="opacity: 0.3; pointer-events: none; transition: 0.3s;">
            
            <div class="tabs">
                <button id="tabPersonal" class="tab-btn active">🔒 個人私帳</button>
                <button id="tabGroup" class="tab-btn">👥 多人群組分帳</button>
            </div>

            <div id="groupCodeArea" class="card" style="display: none; background: #f9f9fc; border: 1px dashed #5856d6;">
                <h4 style="margin: 0 0 10px 0; color: #5856d6;">🏠 房間連線管理</h4>
                <p id="currentGroupStatus" style="font-size: 14px; margin: 5px 0 12px 0; color: #8e8e93;">當前狀態：尚未進入任何群組房間</p>
                
                <div style="display: flex; gap: 8px; margin-bottom: 10px;">
                    <input type="text" id="groupCode" placeholder="請輸入4碼群組代號" maxlength="4" style="flex: 2; padding: 8px; border: 1px solid #c7c7cc; border-radius: 6px; text-align: center; font-size: 16px; font-weight: bold; letter-spacing: 2px;">
                    <button id="joinGroupBtn" style="flex: 1; background: #5856d6; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 14px;">加入房間</button>
                </div>
                
                <div style="display: flex; gap: 8px;">
                    <button id="createGroupBtn" style="flex: 1; background: #34c759; color: white; border: none; border-radius: 6px; padding: 8px; cursor: pointer; font-size: 13px; font-weight: bold;">➕ 建立新群組房間</button>
                    <button id="leaveGroupBtn" style="flex: 1; background: #ff3b30; color: white; border: none; border-radius: 6px; padding: 8px; cursor: pointer; font-size: 13px; font-weight: bold; display: none;">🚪 退出當前群組</button>
                </div>
            </div>

            <div class="card">
                <h3 id="currentModeTitle">新增個人消費</h3>
                
                <button id="scanInvoiceBtn" class="btn-scan">📷 掃描發票 QR Code 記帳</button>
                <div id="reader" style="display: none; width: 100%; max-width: 350px; margin: 0 auto 10px auto;"></div>

                <div class="form-group">
                    <label>消費日期：</label>
                    <input type="date" id="dateInput">
                </div>
                <div class="form-group">
                    <label>花費品名：</label>
                    <input type="text" id="itemInput" placeholder="例如：午餐、八方">
                </div>
                <div class="form-group">
                    <label>金額：</label>
                    <input type="number" id="amountInput" placeholder="輸入金額">
                </div>

                <div class="form-group" id="payerArea" style="display: none;">
                    <label>誰墊的錢？</label>
                    <input type="text" id="payerInput" placeholder="留空預設為你自己">
                </div>

                <button id="saveBtn">儲存至雲端</button>
            </div>

            <div id="reportArea">
                <h3>📊 帳目統計 (總覽)</h3>
                <div id="reportCard" class="card report-card">
                    <p>計算中...</p>
                </div>
            </div>

            <div class="history-title-area" style="display: flex; justify-content: space-between; align-items: center; margin-top: 20px;">
                <h3>📜 歷史消費明細 (點擊日期可收折)</h3>
                <div class="history-actions">
                    <button id="deleteSelectedBtn" style="background: none; border: 1px solid #ff3b30; color: #ff3b30; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 12px;">🗑️ 刪除選中</button>
                    <button id="deleteAllBtn" style="background: #ff3b30; border: none; color: #fff; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 12px; margin-left: 5px;">💥 清空全部</button>
                </div>
            </div>

            <div id="historyCollapseContainer">
                <p style="text-align: center; color: #8e8e93; margin-top: 20px;">載入中...</p>
            </div>

        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
